      function initApiClient2(resp, sSource, oc) {

        const tableData2 = oc.map(value => {
          
          if (value.length > 2) {
            return `<tr><td class=tdTrans>${value}</td></tr>`;
          }
          return "";

        }).join('');

        const tableBody2 = document.querySelector("#tableBody2");
        let nId = 0
        tableBody2.innerHTML = tableData2;
        const tableData = resp.map(value => {
          nId = nId + 1;
          return (
            `<tr>
       <td id=s${nId}>${value.source}</td>
       <td id=t${nId}>${value.target}</td>     
           </tr>`
          );

        }).join('');

        const tableBody = document.querySelector("#tableBody");
        tableBody.innerHTML = tableData;
